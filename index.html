<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GamebananaAPI Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-plugin-enum-names/dist/index.css" />
  <style>
    :root {
      --bg-1: #fffbe8;
      --bg-2: #fff3c9;
      --ink: #352700;
      --accent: #d7a21a;
      --accent-2: #f2c94c;
      --panel: #ffffff;
      --muted: #7a651d;
    }

    html, body {
      margin: 0;
      padding: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, #fffdf0 0%, transparent 40%),
        radial-gradient(circle at 100% 0%, #fff6d8 0%, transparent 45%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      min-height: 100%;
    }

    .topbar {
      display: none;
    }

    #swagger-ui {
      max-width: 1100px;
      margin: 0 auto 24px;
      background: var(--panel);
      border: 1px solid #f2dc93;
      border-radius: 14px;
      box-shadow: 0 14px 40px rgba(92, 63, 10, 0.1);
      overflow: hidden;
    }

    .swagger-ui .opblock.opblock-get {
      border-color: #e2bc49;
      background: #fffaf0;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: #cf9b24;
      background: #fff7e6;
    }

    .swagger-ui .opblock.opblock-delete {
      border-color: #cf7f20;
      background: #fff2df;
    }

    .swagger-ui .btn.authorize {
      border-color: var(--accent);
      color: var(--accent);
    }

    .swagger-ui .btn.execute {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-plugin-hierarchical-tags"></script>
  <script src="https://unpkg.com/swagger-ui-plugin-enum-names"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: "./openapi.yaml",
      dom_id: "#swagger-ui",
      deepLinking: true,
      docExpansion: "none",
      displayRequestDuration: true,
      displayOperationId: false,
      filter: true,
      operationsSorter: "alpha",
      tagsSorter: "alpha",
      persistAuthorization: true,
      requestSnippetsEnabled: true,
      tryItOutEnabled: true,
      hierarchicalTagSeparator: /[|:]/,
      syntaxHighlight: {
        activated: true,
        theme: "nord"
      },
      presets: [
        SwaggerUIBundle.presets.apis
      ],
      plugins: [
        SwaggerUIBundle.plugins.DownloadUrl,
        HierarchicalTagsPlugin,
        EnumNamesPlugin.EnumNamesPlugin
      ],
      layout: "BaseLayout"
    });
  </script>
</body>
</html>
