<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GamebananaAPI Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-plugin-enum-names/dist/index.css" />
  <style>
    :root {
      --bg-1: #f3f4ef;
      --bg-2: #e9efe3;
      --ink: #1f2b1e;
      --accent: #3d7a2f;
      --accent-2: #8bb94a;
      --panel: #ffffff;
      --muted: #5d6f5a;
    }

    html, body {
      margin: 0;
      padding: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, #f8fcf4 0%, transparent 40%),
        radial-gradient(circle at 100% 0%, #eef8e2 0%, transparent 45%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      min-height: 100%;
    }

    .topbar {
      display: none;
    }

    .docs-hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 8px;
    }

    .docs-hero h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0.4px;
      color: #173514;
    }

    .docs-hero p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    #swagger-ui {
      max-width: 1100px;
      margin: 0 auto 24px;
      background: var(--panel);
      border: 1px solid #dde7d6;
      border-radius: 14px;
      box-shadow: 0 14px 40px rgba(28, 44, 18, 0.09);
      overflow: hidden;
    }

    .swagger-ui .opblock.opblock-get {
      border-color: #8dbb5a;
      background: #f7fdf1;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: #3a8b46;
      background: #f3fbf4;
    }

    .swagger-ui .opblock.opblock-delete {
      border-color: #d27f37;
      background: #fff7ef;
    }

    .swagger-ui .btn.authorize {
      border-color: var(--accent);
      color: var(--accent);
    }

    .swagger-ui .btn.execute {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <section class="docs-hero">
    <h1>GameBanana API v11</h1>
    <p>Interactive reference with grouped tags, enum labels, snippets, and live request tooling.</p>
  </section>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-plugin-hierarchical-tags"></script>
  <script src="https://unpkg.com/swagger-ui-plugin-enum-names"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: "./openapi.yaml",
      dom_id: "#swagger-ui",
      deepLinking: true,
      docExpansion: "none",
      displayRequestDuration: true,
      displayOperationId: true,
      filter: true,
      operationsSorter: "alpha",
      tagsSorter: "alpha",
      persistAuthorization: true,
      requestSnippetsEnabled: true,
      tryItOutEnabled: true,
      hierarchicalTagSeparator: /[|:]/,
      syntaxHighlight: {
        activated: true,
        theme: "nord"
      },
      presets: [
        SwaggerUIBundle.presets.apis
      ],
      plugins: [
        SwaggerUIBundle.plugins.DownloadUrl,
        HierarchicalTagsPlugin,
        EnumNamesPlugin.EnumNamesPlugin
      ],
      layout: "BaseLayout"
    });
  </script>
</body>
</html>
