<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GamebananaAPI Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-plugin-enum-names/dist/index.css" />
  <style>
    :root {
      --bg-1: #fffbe8;
      --bg-2: #fff3c9;
      --ink: #352700;
      --accent: #d7a21a;
      --accent-2: #f2c94c;
      --panel: #ffffff;
      --muted: #7a651d;
    }

    html, body {
      margin: 0;
      padding: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, #fffdf0 0%, transparent 40%),
        radial-gradient(circle at 100% 0%, #fff6d8 0%, transparent 45%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      min-height: 100%;
    }

    .topbar {
      display: none;
    }

    .tools-wrap {
      max-width: 1100px;
      margin: 18px auto 10px;
      background: #fff8e2;
      border: 1px solid #efd27b;
      border-radius: 12px;
      box-shadow: 0 8px 22px rgba(92, 63, 10, 0.08);
      padding: 10px;
      position: sticky;
      top: 10px;
      z-index: 30;
    }

    .tools-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    #endpoint-jump {
      flex: 1 1 320px;
      min-width: 260px;
      border: 1px solid #d8bb64;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fffdf3;
      color: var(--ink);
    }

    .tool-btn {
      border: 1px solid #d2af4f;
      background: #fff5d3;
      color: #4f3e08;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
    }

    .tool-btn:hover {
      background: #ffefbf;
    }

    .chip {
      border: 1px solid #dbbd63;
      background: #fff3ca;
      color: #58460b;
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }

    .chip.active {
      border-color: #be8a12;
      background: linear-gradient(90deg, #f0c752, #dfab2f);
      color: #3f2e02;
      font-weight: 700;
    }

    .chips-wrap {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .host-wrap {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .host-label {
      font-size: 12px;
      color: #6e5a17;
      font-weight: 700;
      margin-right: 2px;
    }

    #swagger-ui {
      max-width: 1100px;
      margin: 0 auto 24px;
      background: var(--panel);
      border: 1px solid #f2dc93;
      border-radius: 14px;
      box-shadow: 0 14px 40px rgba(92, 63, 10, 0.1);
      overflow: hidden;
    }

    .swagger-ui .opblock.opblock-get {
      border-color: #e2bc49;
      background: #fffaf0;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: #cf9b24;
      background: #fff7e6;
    }

    .swagger-ui .opblock.opblock-delete {
      border-color: #cf7f20;
      background: #fff2df;
    }

    .swagger-ui .btn.authorize {
      border-color: var(--accent);
      color: var(--accent);
    }

    .swagger-ui .btn.execute {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-color: var(--accent);
    }

    .swagger-ui .opblock.jump-hit {
      box-shadow: 0 0 0 3px rgba(207, 155, 36, 0.36) inset;
      border-color: #ba8614;
    }
  </style>
</head>
<body>
  <div class="tools-wrap">
    <div class="tools-row">
      <input id="endpoint-jump" type="text" placeholder="Jump to endpoint (example: /apiv11/Member/Authenticate)" />
      <button class="tool-btn" id="jump-btn" type="button">Go</button>
      <button class="tool-btn" id="clear-filter" type="button">Reset</button>
    </div>
    <div class="chips-wrap" id="quick-chips">
      <button class="chip active" data-filter="">All</button>
      <button class="chip" data-filter="v11:">v11</button>
      <button class="chip" data-filter="v10:">v10</button>
      <button class="chip" data-filter="v9:">v9</button>
      <button class="chip" data-filter="v8:">v8</button>
      <button class="chip" data-filter="v7:">v7</button>
      <button class="chip" data-filter="core:">core</button>
      <button class="chip" data-filter="rss:">rss</button>
    </div>
    <div class="host-wrap" id="host-chips">
      <span class="host-label">Host</span>
      <button class="chip active" data-host="all">All Hosts</button>
      <button class="chip" data-host="gamebanana.com">gamebanana.com</button>
      <button class="chip" data-host="api.gamebanana.com">api.gamebanana.com</button>
      <button class="chip" data-host="dev.gamebanana.com">dev.gamebanana.com</button>
      <button class="chip" data-host="api.dev.gamebanana.com">api.dev.gamebanana.com</button>
    </div>
  </div>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-plugin-hierarchical-tags"></script>
  <script src="https://unpkg.com/swagger-ui-plugin-enum-names"></script>
  <script src="https://unpkg.com/js-yaml@4/dist/js-yaml.min.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: "./openapi.yaml",
      dom_id: "#swagger-ui",
      deepLinking: true,
      docExpansion: "none",
      displayRequestDuration: true,
      displayOperationId: false,
      filter: true,
      operationsSorter: "alpha",
      tagsSorter: "alpha",
      persistAuthorization: true,
      requestSnippetsEnabled: true,
      tryItOutEnabled: true,
      hierarchicalTagSeparator: /[|:]/,
      syntaxHighlight: {
        activated: true,
        theme: "nord"
      },
      presets: [
        SwaggerUIBundle.presets.apis
      ],
      plugins: [
        SwaggerUIBundle.plugins.DownloadUrl,
        HierarchicalTagsPlugin,
        EnumNamesPlugin.EnumNamesPlugin
      ],
      layout: "BaseLayout"
    });

    function getBuiltInFilterInput() {
      return document.querySelector(".swagger-ui .filter input");
    }

    const methodPattern = /\bopblock-(get|post|put|patch|delete|head|options|trace)\b/i;
    const viabilityStatuses = new Set([200, 400, 401, 403, 405]);
    let selectedHost = "all";
    let availabilityByOperation = new Map();

    function setBuiltInFilter(value) {
      const input = getBuiltInFilterInput();
      if (!input) {
        return;
      }
      input.value = value;
      input.dispatchEvent(new Event("input", { bubbles: true }));
      window.setTimeout(applyHostFilter, 80);
    }

    function parseStatus(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : -1;
    }

    function operationKey(method, path) {
      return method.toUpperCase() + " " + path;
    }

    function loadAvailabilityMap() {
      return fetch("./openapi.yaml")
        .then(function (res) {
          return res.text();
        })
        .then(function (yamlText) {
          const doc = window.jsyaml.load(yamlText) || {};
          const paths = doc.paths || {};
          const nextMap = new Map();

          Object.keys(paths).forEach(function (path) {
            const pathItem = paths[path] || {};
            Object.keys(pathItem).forEach(function (method) {
              const low = method.toLowerCase();
              if (!["get", "post", "put", "patch", "delete", "head", "options", "trace"].includes(low)) {
                return;
              }
              const op = pathItem[method] || {};
              const availability = op["x-server-availability"];
              if (!availability || typeof availability !== "object") {
                return;
              }
              nextMap.set(operationKey(low, path), availability);
            });
          });

          availabilityByOperation = nextMap;
          applyHostFilter();
        })
        .catch(function () {
          availabilityByOperation = new Map();
          applyHostFilter();
        });
    }

    function getOpMethod(block) {
      const className = block.className || "";
      const match = className.match(methodPattern);
      return match ? match[1].toLowerCase() : "get";
    }

    function getOpPath(block) {
      const pathNode = block.querySelector(".opblock-summary-path");
      return pathNode ? pathNode.textContent.trim() : "";
    }

    function isVisibleForSelectedHost(method, path) {
      if (selectedHost === "all") {
        return true;
      }
      const key = operationKey(method, path);
      const availability = availabilityByOperation.get(key);
      if (!availability) {
        return true;
      }
      return viabilityStatuses.has(parseStatus(availability[selectedHost]));
    }

    function applyHostFilter() {
      const blocks = document.querySelectorAll(".swagger-ui .opblock");
      blocks.forEach(function (block) {
        const method = getOpMethod(block);
        const path = getOpPath(block);
        const visible = path ? isVisibleForSelectedHost(method, path) : true;
        block.style.display = visible ? "" : "none";
      });
    }

    function clearJumpHighlights() {
      document.querySelectorAll(".swagger-ui .opblock.jump-hit").forEach(function (el) {
        el.classList.remove("jump-hit");
      });
    }

    function jumpToEndpoint(raw) {
      const query = (raw || "").trim().toLowerCase();
      if (!query) {
        return;
      }

      setBuiltInFilter(query);

      window.setTimeout(function () {
        clearJumpHighlights();
        const opblocks = Array.from(document.querySelectorAll(".swagger-ui .opblock"));
        if (opblocks.length === 0) {
          return;
        }

        const scored = opblocks
          .map(function (block) {
            const pathNode = block.querySelector(".opblock-summary-path");
            const text = (pathNode ? pathNode.textContent : "").trim().toLowerCase();
            if (!text) {
              return null;
            }
            if (text === query) {
              return { block: block, score: 0 };
            }
            if (text.indexOf(query) >= 0) {
              return { block: block, score: 1 };
            }
            return null;
          })
          .filter(Boolean)
          .sort(function (a, b) {
            return a.score - b.score;
          });

        if (scored.length === 0) {
          return;
        }

        const target = scored[0].block;
        const summary = target.querySelector(".opblock-summary");
        if (summary && !target.classList.contains("is-open")) {
          summary.click();
        }

        target.classList.add("jump-hit");
        target.scrollIntoView({ behavior: "smooth", block: "center" });
      }, 120);
    }

    document.getElementById("jump-btn").addEventListener("click", function () {
      jumpToEndpoint(document.getElementById("endpoint-jump").value);
    });

    document.getElementById("endpoint-jump").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        jumpToEndpoint(event.target.value);
      }
    });

    document.getElementById("clear-filter").addEventListener("click", function () {
      document.getElementById("endpoint-jump").value = "";
      setBuiltInFilter("");
      clearJumpHighlights();
      document.querySelectorAll("#quick-chips .chip").forEach(function (chip, idx) {
        chip.classList.toggle("active", idx === 0);
      });
      selectedHost = "all";
      document.querySelectorAll("#host-chips .chip").forEach(function (chip, idx) {
        chip.classList.toggle("active", idx === 0);
      });
      applyHostFilter();
    });

    document.querySelectorAll("#quick-chips .chip").forEach(function (chip) {
      chip.addEventListener("click", function () {
        const filterValue = chip.getAttribute("data-filter") || "";
        setBuiltInFilter(filterValue);
        document.querySelectorAll("#quick-chips .chip").forEach(function (c) {
          c.classList.remove("active");
        });
        chip.classList.add("active");
      });
    });

    document.querySelectorAll("#host-chips .chip").forEach(function (chip) {
      chip.addEventListener("click", function () {
        selectedHost = chip.getAttribute("data-host") || "all";
        document.querySelectorAll("#host-chips .chip").forEach(function (c) {
          c.classList.remove("active");
        });
        chip.classList.add("active");
        applyHostFilter();
      });
    });

    document.addEventListener("keydown", function (event) {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        const input = document.getElementById("endpoint-jump");
        input.focus();
        input.select();
      }
    });

    const observer = new MutationObserver(function () {
      applyHostFilter();
    });
    observer.observe(document.getElementById("swagger-ui"), { childList: true, subtree: true });

    loadAvailabilityMap();
  </script>
</body>
</html>
