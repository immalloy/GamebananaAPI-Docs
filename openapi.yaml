        name: _csvModelInclusions
        required: false
        schema:
          type: string
        description: 'Comma-separated list of sections to include in the search results.
          Allowed values: App, Article, Bug, Blog, Club, Contest, Concept, Event,
          Game, Idea, Initiative, Jam, Mod, Model, Member, News, Poll, Project, Question,
          Review, Request, Script, Sound, Spray, Studio, Thread, Tool, Tutorial, Wiki,
          Wip.'
      - in: query
        name: _csvModelExclusions
        required: false
        schema:
          type: string
        description: 'Comma-separated list of sections to exclude from the search
          results. Allowed values: App, Article, Bug, Blog, Club, Contest, Concept,
          Event, Game, Idea, Initiative, Jam, Mod, Model, Member, News, Poll, Project,
          Question, Review, Request, Script, Sound, Spray, Studio, Thread, Tool, Tutorial,
          Wiki, Wip.'
